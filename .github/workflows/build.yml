name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Установка BeeWare
        run: pip install briefcase
        
      - name: Создание Xcode проекта
        run: briefcase create iOS
        
      - name: Обман скрипта подписи и Компиляция
        run: |
          cd build/*/ios/xcode
          
          # Подменяем системную команду codesign на "пустышку", чтобы скрипты не выдавали ошибку
          mkdir -p /tmp/fake_bin
          echo '#!/bin/bash' > /tmp/fake_bin/codesign
          echo 'exit 0' >> /tmp/fake_bin/codesign
          chmod +x /tmp/fake_bin/codesign
          export PATH="/tmp/fake_bin:$PATH"
          
          # Собираем под реальное устройство без подписи
          xcodebuild build -project *.xcodeproj -scheme SKEdit -sdk iphoneos -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          
      - name: Создание Payload и IPA
        run: |
          mkdir Payload
          cp -r build/*/ios/xcode/build/Release-iphoneos/*.app Payload/
          zip -r SKEdit_iOS.ipa Payload
          
      - name: Выгрузка готового IPA
        uses: actions/upload-artifact@v4
        with:
          name: SKEdit_App
          path: SKEdit_iOS.ipa
